<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Verdant — Nameplate Survey v1.7</title>
<style>
:root{
  --dk:#0E321C;--md:#1B5E38;--ac:#97B23E;--lt:#C5CD9F;
  --bg:#EFF4E8;--card:#fff;--border:#D4DFC4;--border2:#B8CCA4;
  --text:#102718;--muted:#5A7A5E;--faint:#A8BEA4;
  --red:#C0392B;--red-bg:#FEF2F0;--red-b:#F5C6C2;
  --amber:#92600A;--amber-bg:#FEFCE8;--amber-b:#F9E09A;
  --scan-bg:#E8F0FE;--scan-b:#A8C0F8;--scan-c:#1A4FBB;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:16px}
input,select,textarea{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:10px;
  background:#fff;color:var(--text);
  transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(151,178,62,.18)}
textarea{resize:vertical;line-height:1.55}
/* Typography */
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(14,50,28,.06)}
.card-head{background:#F7FAF2;padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-body{padding:16px;display:grid;gap:14px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;white-space:nowrap;-webkit-appearance:none;letter-spacing:.01em}
.btn:active{opacity:.82;transform:scale(.97)}
.btn-primary{background:var(--dk);color:#fff;box-shadow:0 2px 6px rgba(14,50,28,.25)}
.btn-accent{background:var(--ac);color:#fff;box-shadow:0 2px 6px rgba(151,178,62,.3)}
.btn-ghost{background:#fff;color:var(--dk);border:1.5px solid var(--border2)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
/* Pills */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em}
.p-high{background:#D6EDCC;color:#1E6B0E}
.p-med{background:#FFF0C2;color:#8A5A00}
.p-low{background:var(--red-bg);color:var(--red)}
.p-rev{background:#EDE0FF;color:#5B21B6}
.p-scan{background:var(--scan-bg);color:var(--scan-c)}
.p-none{background:#EEF2EB;color:var(--faint)}
/* Layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Photo strip */
.photo-strip{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.photo-strip::-webkit-scrollbar{height:4px}
.photo-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.photo-thumb{position:relative;flex-shrink:0;width:108px;height:88px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);background:#F7FAF2}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.del-photo{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(14,50,28,.72);color:#fff;border:none;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center}
.scan-overlay{position:absolute;inset:0;background:rgba(27,94,56,.38);display:flex;align-items:center;justify-content:center}
.done-badge{position:absolute;bottom:5px;left:5px;background:var(--md);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.err-badge{position:absolute;bottom:5px;left:5px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px}
.photo-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
/* Status bars */
.sbar{padding:9px 14px;font-size:13px;display:flex;align-items:flex-start;gap:8px;border-top:1px solid}
.s-scan{background:var(--scan-bg);border-color:var(--scan-b);color:var(--scan-c)}
.s-done{background:#EAF5E4;border-color:#B6DFA8;color:#1B6B0E}
.s-err{background:var(--red-bg);border-color:var(--red-b);color:var(--red)}
.s-warn{background:var(--amber-bg);border-color:var(--amber-b);color:var(--amber)}
.err-detail{font-size:11px;opacity:.8;margin-top:3px;word-break:break-word}
/* Fields */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mono{font-family:'SFMono-Regular',Menlo,'Courier New',monospace;font-size:13px}
.sec{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:11px}
/* Review */
.rrow{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;font-size:13px}
.rcell{padding:4px 0;border-bottom:1px solid #F0F4EB}
.rkey{color:var(--faint)}
.rval{font-weight:700;font-family:monospace;color:var(--text)}
.rval.e{color:#D4DFC4}
/* Summary stats */
.stat{background:#F7FAF2;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-l{font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.stat-v{font-size:26px;font-weight:900;color:var(--dk);line-height:1.1;margin-top:3px}
/* Step bar */
.step-bar{display:flex;align-items:center;margin-bottom:20px}
.sdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.sline{flex:1;height:2px}
.slbl{font-size:11px;font-weight:700;margin-top:4px;text-align:center}
/* Header */
#hdr{background:var(--dk);color:#fff;padding:13px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(14,50,28,.3)}
.hi{display:flex;align-items:center;justify-content:space-between;max-width:660px;margin:0 auto}
.hbrand{font-size:12px;color:var(--lt);font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.htitle{font-size:18px;font-weight:900;display:flex;align-items:baseline;gap:8px;letter-spacing:-.01em}
.hver{font-size:11px;font-weight:700;background:rgba(197,205,159,.22);color:var(--lt);padding:2px 8px;border-radius:5px;letter-spacing:.05em}
.ocrs{font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px}
.ocrs.loading{color:#FADA75}
.ocrs.ready{color:#7FDB72}
.ocrs.failed{color:#F8A9A4}
/* Main */
#main{max-width:660px;margin:0 auto;padding:16px 14px 56px}
.rmv{background:none;border:none;cursor:pointer;color:#CC5555;font-size:22px;line-height:1;padding:2px 6px;border-radius:7px;transition:background .15s}
.rmv:hover{background:#FEF2F0}
.pbar{height:3px;background:rgba(255,255,255,.18);border-radius:2px;margin-top:4px;width:76px}
.pfill{height:100%;border-radius:2px;background:var(--ac);transition:width .4s}
.nbx{margin-top:9px;background:#F7FAF2;border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--muted);line-height:1.55}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .85s linear infinite}
/* Divider */
.field-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
</style>
</head>
<body>

<div id="hdr">
  <div class="hi">
    <div>
      <div class="hbrand">Verdant Energy Consulting</div>
      <div class="htitle">Nameplate Survey <span class="hver">v1.7</span></div>
    </div>
    <div style="text-align:right">
      <div id="ocr-txt" class="ocrs loading"><span class="spin">⟳</span> Loading OCR…</div>
      <div id="prog-wrap" style="display:none">
        <div style="font-size:11px;color:var(--lt)" id="prog-lbl">0%</div>
        <div class="pbar"><div class="pfill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="main"><div id="root"></div></div>

<script>
const APP_VER='v1.7';
const HTYPES=['Single-family detached','Single-family attached','Manufactured home','Apartment / multifamily','Commercial','Other'];
const ATYPES=['Water Heater','Furnace / Boiler','Heat Pump','Air Conditioner','Refrigerator','Freezer','Dishwasher','Clothes Washer','Clothes Dryer','Range / Oven','Electrical Panel','Other'];

// ── State ─────────────────────────────────────────────────────────────────────
const S={
  step:1, ocrState:'loading',
  r:{siteId:'',address:'',contactName:'',email:'',homeType:'Single-family detached',yearBuilt:'',notes:''},
  items:[mkItem()],
};

// Sequential queue prevents concurrent recognize() calls
let ocrQ=Promise.resolve();

function uid(){return Math.random().toString(36).slice(2,10)}
function mkItem(){return{id:uid(),type:'Water Heater',location:'',photos:[],combinedOcr:'',data:{manufacturer:'',model:'',serial:'',year:'',capacity:'',fuel:'',efficiency:'',voltage:'',inputOutput:'',notes:'',confidence:'Not processed'}}}
function mkPhoto(file,preview){return{id:uid(),file,preview,status:'idle',ocrText:'',error:''}}
function getItem(id){return S.items.find(i=>i.id===id)}
function updItem(id,p){const x=S.items.findIndex(i=>i.id===id);if(x>=0)S.items[x]={...S.items[x],...p}}
function errMsg(e){if(!e)return'Unknown error';if(typeof e==='string')return e;if(e.message)return e.message;try{return JSON.stringify(e)}catch{return String(e)}}

// ── Tesseract v2 init ─────────────────────────────────────────────────────────
// Using v2 (not v4) — stable CDN paths, no LSTM/SIMD WASM compatibility issues.
// All three paths pinned to known-good unpkg versions.
const T2_OPTS={
  workerPath:'https://unpkg.com/tesseract.js@2.1.5/dist/worker.min.js',
  corePath:  'https://unpkg.com/tesseract.js-core@2.2.0/tesseract-core.wasm.js',
  langPath:  'https://tessdata.projectnaptha.com/4.0.0',
  gzip:false,
  logger:()=>{},
};

function initOCR(){
  if(typeof Tesseract==='undefined'){
    S.ocrState='failed';setOcrUI('failed','⚠ OCR library not loaded');return;
  }
  S.ocrState='ready';
  setOcrUI('ready','✓ OCR ready (first scan ~5s download)');
}
function setOcrUI(cls,txt){const el=document.getElementById('ocr-txt');el.className='ocrs '+cls;el.innerHTML=txt}

// ── Sequential OCR queue ──────────────────────────────────────────────────────
async function ocrPhoto(itemId,photoId){
  ocrQ=ocrQ.then(()=>_doOcr(itemId,photoId)).catch(()=>{});
  return ocrQ;
}

async function _doOcr(itemId,photoId){
  const item=getItem(itemId);if(!item)return;
  const photo=item.photos.find(p=>p.id===photoId);
  if(!photo||photo.status==='done')return;
  photo.status='scanning';photo.error='';render();
  try{
    if(S.ocrState!=='ready')throw new Error('OCR engine not ready — reload the page');
    // Tesseract v2: top-level recognize() manages worker lifecycle internally
    // Pass original File — v2 handles Blob/File natively via FileReader
    const result=await Tesseract.recognize(photo.file,'eng',T2_OPTS);
    const text=result?.data?.text??'';
    photo.status='done';photo.ocrText=text.trim();
  }catch(err){
    photo.status='error';photo.error=errMsg(err);
    console.error('OCR failed:',err);
  }
  _rebuildCombined(itemId);render();
}
function _rebuildCombined(itemId){
  const item=getItem(itemId);if(!item)return;
  const combined=item.photos.filter(p=>p.status==='done').map(p=>p.ocrText).filter(Boolean).join(' ');
  updItem(itemId,{combinedOcr:combined,data:parseOCR(combined,item.type)});
}

// ── Add / remove photos ───────────────────────────────────────────────────────
async function addPhotos(itemId,files){
  if(!files||!files.length)return;
  const item=getItem(itemId);if(!item)return;
  const toOcr=[];
  for(const file of Array.from(files)){
    const ph=mkPhoto(file,URL.createObjectURL(file));
    item.photos.push(ph);toOcr.push(ph.id);
  }
  render();
  for(const pid of toOcr)await ocrPhoto(itemId,pid);
}
function removePhoto(itemId,photoId){
  const item=getItem(itemId);if(!item)return;
  item.photos=item.photos.filter(p=>p.id!==photoId);
  _rebuildCombined(itemId);render();
}

// ── OCR text parser ───────────────────────────────────────────────────────────
function wAfter(t,lbls,n=2){
  const pts=String(t||'').replace(/[:#]/g,' ').split(/\s+/).filter(Boolean);
  const up=pts.map(p=>p.toUpperCase());
  for(const l of lbls){const lp=l.toUpperCase().split(' ');for(let i=0;i<=up.length-lp.length;i++){if(up.slice(i,i+lp.length).join(' ')===lp.join(' '))return pts.slice(i+lp.length,i+lp.length+n).join(' ')}}
  return '';
}
function fUnit(t,units){
  const pts=String(t||'').replace(/[:#]/g,' ').split(/\s+/).filter(Boolean);
  for(let i=1;i<pts.length;i++){if(units.includes(pts[i].toUpperCase()))return`${pts[i-1]} ${pts[i]}`.toUpperCase()}
  return '';
}
function iYear(s,t){const c=`${s} ${t}`;for(let y=1990;y<=2035;y++)if(c.includes(String(y)))return String(y);return ''}
function parseOCR(text,app){
  if(!text||!text.trim())return{manufacturer:'',model:'',serial:'',year:'',capacity:'',fuel:'',efficiency:'',voltage:'',inputOutput:'',notes:'',confidence:'Not processed'};
  const raw=String(text).replace(/\r?\n/g,' ').trim(),up=raw.toUpperCase();
  const manufacturer=wAfter(raw,['MANUFACTURER','MFR','MFG','BRAND','MAKE'],1);
  const model=wAfter(raw,['MODEL','MODEL NO','MODEL NUMBER','MOD'],1);
  const serial=wAfter(raw,['SERIAL','SERIAL NO','SERIAL NUMBER','S N','SER NO'],1);
  const year=wAfter(raw,['MFG DATE','MANUFACTURED','DATE'],1)||iYear(serial,raw);
  const capacity=fUnit(raw,['GAL','GALLON','GALLONS','TON','TONS','CFM','KW','KWH','BTUH','BTU']);
  const voltage=fUnit(raw,['V','VOLTS','VOLT']);
  const efficiency=up.includes('UEF')?`UEF ${wAfter(raw,['UEF'],1)}`:up.includes('AFUE')?`AFUE ${wAfter(raw,['AFUE'],1)}`:up.includes('SEER2')?`SEER2 ${wAfter(raw,['SEER2'],1)}`:up.includes('SEER')?`SEER ${wAfter(raw,['SEER'],1)}`:up.includes('ENERGY FACTOR')?`EF ${wAfter(raw,['ENERGY FACTOR'],1)}`:up.includes('HSPF')?`HSPF ${wAfter(raw,['HSPF'],1)}`:'';
  const fuel=up.includes('NATURAL GAS')?'Natural gas':up.includes('PROPANE')||up.includes(' LP ')?'Propane':up.includes('ELECTRIC')?'Electric':up.includes('OIL')?'Fuel oil':'';
  const inputOutput=up.includes('INPUT')?`INPUT ${wAfter(raw,['INPUT'],2)}`.trim():up.includes('OUTPUT')?`OUTPUT ${wAfter(raw,['OUTPUT'],2)}`.trim():'';
  const hits=[manufacturer,model,serial,year,capacity,fuel,efficiency,voltage,inputOutput].filter(Boolean).length;
  return{manufacturer,model,serial,year,capacity,fuel,efficiency,voltage,inputOutput,
    notes:app==='Water Heater'&&!capacity?'Verify gallons/BTU/kW from nameplate.':'',
    confidence:hits>=6?'High':hits>=4?'Medium':hits>=1?'Low':'Needs review'};
}

// ── Export ────────────────────────────────────────────────────────────────────
function dl(name,c,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=name;a.click()}
function exportJSON(){dl(`verdant-survey-${S.r.siteId||'out'}.json`,JSON.stringify({appVersion:APP_VER,submittedAt:new Date().toISOString(),respondent:S.r,equipment:S.items.map(i=>({...i,photos:i.photos.map(p=>({id:p.id,status:p.status,ocrText:p.ocrText,error:p.error}))}))},null,2),'application/json')}
function exportCSV(){
  const e=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const h=['site_id','address','home_type','year_built','type','location','photo_count','manufacturer','model','serial','year','capacity','fuel','efficiency','voltage','input_output','confidence','notes','combined_ocr'];
  const rows=S.items.map(i=>[S.r.siteId,S.r.address,S.r.homeType,S.r.yearBuilt,i.type,i.location,i.photos.length,i.data.manufacturer,i.data.model,i.data.serial,i.data.year,i.data.capacity,i.data.fuel,i.data.efficiency,i.data.voltage,i.data.inputOutput,i.data.confidence,i.data.notes,i.combinedOcr].map(e).join(','));
  dl(`verdant-survey-${S.r.siteId||'out'}.csv`,[h.join(','),...rows].join('\n'),'text/csv');
}

// ── Render helpers ────────────────────────────────────────────────────────────
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pillCls(c){return c==='High'?'pill p-high':c==='Medium'?'pill p-med':c==='Low'?'pill p-low':c==='Needs review'?'pill p-rev':c==='Scanning...'?'pill p-scan':'pill p-none'}
function stepBar(){
  return`<div class="step-bar">${['Site info','Equipment','Review'].map((l,i)=>{
    const n=i+1,a=S.step==n,d=S.step>n;
    const bg=d?'var(--ac)':a?'var(--dk)':'var(--border)';
    const fg=d||a?'#fff':'var(--faint)';
    const lc=a?'var(--dk)':d?'var(--ac)':'var(--faint)';
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto"><div class="sdot" style="background:${bg};color:${fg}">${d?'✓':n}</div><div class="slbl" style="color:${lc}">${l}</div></div>${i<2?`<div class="sline" style="background:${d?'var(--ac)':'var(--border)'};margin-bottom:20px"></div>`:''}`
  }).join('')}</div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  const{step,items,r}=S;
  const proc=items.filter(i=>i.data.confidence!=='Not processed').length;
  const pct=items.length?Math.round(proc/items.length*100):0;
  const pw=document.getElementById('prog-wrap');
  if(step===2){pw.style.display='block';document.getElementById('prog-lbl').textContent=pct+'%';document.getElementById('prog-fill').style.width=pct+'%'}
  else pw.style.display='none';

  // ── Step 1 ──────────────────────────────────────────────────────────────
  if(step===1){
    root.innerHTML=stepBar()+`
    <div class="card">
      <div class="card-head"><span style="font-weight:800;font-size:16px;color:var(--dk)">Site information</span></div>
      <div class="card-body">
        <div class="g2">
          <div><label class="lbl">Site / Household ID</label><input id="f-siteId" value="${esc(r.siteId)}" placeholder="HH-0042"></div>
          <div><label class="lbl">Contact name</label><input id="f-contactName" value="${esc(r.contactName)}"></div>
        </div>
        <div><label class="lbl">Address</label><input id="f-address" value="${esc(r.address)}" placeholder="123 Main St, City, State"></div>
        <div><label class="lbl">Email</label><input id="f-email" type="email" value="${esc(r.email)}" placeholder="optional"></div>
        <div class="g2">
          <div><label class="lbl">Home type</label><select id="f-homeType">${HTYPES.map(t=>`<option${t===r.homeType?' selected':''}>${t}</option>`).join('')}</select></div>
          <div><label class="lbl">Year built</label><input id="f-yearBuilt" value="${esc(r.yearBuilt)}" placeholder="1987" inputmode="numeric"></div>
        </div>
        <div><label class="lbl">Survey notes</label><textarea id="f-notes" rows="3" placeholder="Any context about this home or program…">${esc(r.notes)}</textarea></div>
        <div style="display:flex;justify-content:flex-end;padding-top:2px">
          <button class="btn btn-primary" onclick="step1Next()">Next: Add equipment →</button>
        </div>
      </div>
    </div>`;
    return;
  }

  // ── Step 2 ──────────────────────────────────────────────────────────────
  if(step===2){
    const cards=items.map((item,idx)=>{
      const c=item.data.confidence;
      const scanning=item.photos.filter(p=>p.status==='scanning');
      const done=item.photos.filter(p=>p.status==='done');
      const errs=item.photos.filter(p=>p.status==='error');
      const thumbs=item.photos.map(p=>`
        <div class="photo-thumb">
          <img src="${p.preview}" alt="">
          ${p.status==='scanning'?`<div class="scan-overlay"><span class="spin" style="color:#fff;font-size:18px">⟳</span></div>`:''}
          ${p.status==='done'?`<div class="done-badge">✓ OCR</div>`:''}
          ${p.status==='error'?`<div class="err-badge" title="${esc(p.error)}">! ERR</div>`:''}
          <button class="del-photo" onclick="removePhoto('${item.id}','${p.id}')">×</button>
        </div>`).join('');
      let statusHtml='';
      if(scanning.length) statusHtml+=`<div class="sbar s-scan"><span class="spin" style="flex-shrink:0">⟳</span> Scanning ${scanning.length} photo(s)…</div>`;
      if(!scanning.length&&done.length&&!errs.length) statusHtml+=`<div class="sbar s-done">✓ ${done.length} photo(s) scanned — ${(item.combinedOcr||'').trim().split(/\s+/).filter(Boolean).length} words extracted</div>`;
      if(errs.length) statusHtml+=`<div class="sbar s-err"><div>⚠ ${errs.length} photo(s) failed<div class="err-detail">${errs.map(p=>esc(p.error||'unknown')).join(' · ')}</div></div></div>`;
      if(S.ocrState==='failed') statusHtml+=`<div class="sbar s-warn">⚠ OCR engine not loaded — type nameplate text in the box below, then tap Re-parse</div>`;

      return`
      <div class="card" id="card-${item.id}">
        <div class="card-head">
          <div style="display:flex;align-items:center;gap:8px;min-width:0">
            <span style="font-weight:800;font-size:15px;color:var(--dk)">#${idx+1}</span>
            <span style="font-weight:700;font-size:15px;color:var(--text)">${esc(item.type)}</span>
            ${item.location?`<span style="font-size:13px;color:var(--faint)">· ${esc(item.location)}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span class="${pillCls(c)}">${c}</span>
            <button class="rmv" onclick="removeItem('${item.id}')" title="Remove">×</button>
          </div>
        </div>
        <div class="card-body">
          <div class="g2">
            <div><label class="lbl">Appliance type</label>
              <select onchange="updF('${item.id}','type',this.value)">${ATYPES.map(t=>`<option${t===item.type?' selected':''}>${t}</option>`).join('')}</select>
            </div>
            <div><label class="lbl">Location in home</label>
              <input placeholder="Basement, utility closet…" value="${esc(item.location)}" oninput="updF('${item.id}','location',this.value)">
            </div>
          </div>

          <div>
            <label class="lbl" style="margin-bottom:9px">
              Nameplate photos
              <span style="font-size:10px;color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0"> — add multiple if the label spans several stickers</span>
            </label>
            ${item.photos.length
              ?`<div class="photo-strip">${thumbs}</div>`
              :`<div style="font-size:13px;color:var(--faint);padding:4px 0 6px">No photos yet — use a button below</div>`}
            <div class="photo-actions">
              <input type="file" accept="image/*" capture="environment" id="cam-${item.id}" style="display:none" onchange="addPhotos('${item.id}',this.files);this.value=''">
              <input type="file" accept="image/*" multiple id="upl-${item.id}" style="display:none" onchange="addPhotos('${item.id}',this.files);this.value=''">
              <button class="btn btn-primary btn-sm" onclick="document.getElementById('cam-${item.id}').click()">📷 Take photo</button>
              <button class="btn btn-ghost btn-sm" onclick="document.getElementById('upl-${item.id}').click()">📁 Upload image</button>
            </div>
            ${statusHtml}
          </div>

          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
              <label class="lbl" style="margin:0">Combined OCR text</label>
              <button class="btn btn-ghost btn-sm" onclick="reparse('${item.id}')">⟳ Re-parse</button>
            </div>
            <textarea class="mono" rows="5"
              placeholder="OCR text from all photos appears here automatically. Edit corrections then tap Re-parse. Or type nameplate text manually."
              oninput="updCombined('${item.id}',this.value)">${esc(item.combinedOcr)}</textarea>
          </div>

          <div>
            <div class="sec">Extracted fields — verify &amp; correct as needed</div>
            <div class="fgrid">
              <div><label class="lbl">Manufacturer</label><input class="mono" value="${esc(item.data.manufacturer)}" oninput="updD('${item.id}','manufacturer',this.value)"></div>
              <div><label class="lbl">Model number</label><input class="mono" value="${esc(item.data.model)}" oninput="updD('${item.id}','model',this.value)"></div>
              <div><label class="lbl">Serial number</label><input class="mono" value="${esc(item.data.serial)}" oninput="updD('${item.id}','serial',this.value)"></div>
              <div><label class="lbl">Year manufactured</label><input class="mono" value="${esc(item.data.year)}" placeholder="e.g. 2019" inputmode="numeric" oninput="updD('${item.id}','year',this.value)"></div>
              <div><label class="lbl">Capacity</label><input class="mono" value="${esc(item.data.capacity)}" placeholder="50 GAL · 3 TON" oninput="updD('${item.id}','capacity',this.value)"></div>
              <div><label class="lbl">Fuel type</label><input class="mono" value="${esc(item.data.fuel)}" oninput="updD('${item.id}','fuel',this.value)"></div>
              <div><label class="lbl">Efficiency rating</label><input class="mono" value="${esc(item.data.efficiency)}" placeholder="UEF 0.93 · SEER 16" oninput="updD('${item.id}','efficiency',this.value)"></div>
              <div><label class="lbl">Voltage</label><input class="mono" value="${esc(item.data.voltage)}" placeholder="240V · 120V" oninput="updD('${item.id}','voltage',this.value)"></div>
            </div>
            <div style="margin-top:11px"><label class="lbl">Input / Output</label>
              <input class="mono" value="${esc(item.data.inputOutput)}" placeholder="INPUT 60,000 BTUH" oninput="updD('${item.id}','inputOutput',this.value)">
            </div>
            <div style="margin-top:11px"><label class="lbl">Reviewer notes</label>
              <textarea rows="2" placeholder="Certifications, amperage, condition notes…" oninput="updD('${item.id}','notes',this.value)">${esc(item.data.notes)}</textarea>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    root.innerHTML=stepBar()+`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:13px;color:var(--muted);font-weight:600">${items.length} appliance${items.length!==1?'s':''} logged</span>
        <button class="btn btn-primary btn-sm" onclick="addItem()">+ Add appliance</button>
      </div>
      ${cards}
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <button class="btn btn-ghost" onclick="go(1)">← Back</button>
        <button class="btn btn-accent" onclick="go(3)">Review &amp; Export →</button>
      </div>`;
    return;
  }

  // ── Step 3 ──────────────────────────────────────────────────────────────
  const doneItems=items.filter(i=>i.photos.some(p=>p.status==='done')).length;
  const highItems=items.filter(i=>i.data.confidence==='High').length;
  const rev=items.map((item,i)=>`
    <div class="card" style="margin-bottom:11px">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:800;color:var(--dk)">#${i+1}</span>
          <span style="font-weight:700">${esc(item.type)}${item.location?' — '+esc(item.location):''}</span>
        </div>
        <span class="${pillCls(item.data.confidence)}">${item.data.confidence}</span>
      </div>
      <div style="padding:13px 15px">
        ${item.photos.filter(p=>p.preview).length?`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:11px;padding-bottom:2px">${item.photos.filter(p=>p.preview).map(p=>`<img src="${p.preview}" style="height:78px;width:auto;border-radius:8px;flex-shrink:0;border:1px solid var(--border);object-fit:cover">`).join('')}</div>`:''}
        <div class="rrow">${[['Manufacturer',item.data.manufacturer],['Model',item.data.model],['Serial',item.data.serial],['Year',item.data.year],['Capacity',item.data.capacity],['Fuel',item.data.fuel],['Efficiency',item.data.efficiency],['Voltage',item.data.voltage],['Input/Output',item.data.inputOutput]].map(([k,v])=>`<div class="rcell"><span class="rkey">${k}:</span> <span class="rval${!v?' e':''}">${v||'—'}</span></div>`).join('')}</div>
        ${item.data.notes?`<div class="nbx">${esc(item.data.notes)}</div>`:''}
      </div>
    </div>`).join('');

  root.innerHTML=stepBar()+`
    <div class="card" style="padding:16px;margin-bottom:14px">
      <div style="font-weight:800;font-size:16px;color:var(--dk);margin-bottom:13px">Survey summary</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:13px">
        <div class="stat"><div class="stat-l">Appliances</div><div class="stat-v">${items.length}</div></div>
        <div class="stat"><div class="stat-l">Scanned</div><div class="stat-v">${doneItems}</div></div>
        <div class="stat"><div class="stat-l">High conf.</div><div class="stat-v">${highItems}</div></div>
      </div>
      <div style="font-size:13px;color:var(--muted)">
        <b style="color:var(--text)">Site:</b> ${esc(r.address)||'—'} &nbsp;·&nbsp;
        <b style="color:var(--text)">ID:</b> ${esc(r.siteId)||'—'} &nbsp;·&nbsp;
        <b style="color:var(--text)">Type:</b> ${esc(r.homeType)}
      </div>
    </div>
    ${rev}
    <div class="card" style="padding:16px;margin-bottom:14px">
      <div style="font-weight:800;font-size:16px;color:var(--dk);margin-bottom:11px">Export data</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <button class="btn btn-primary" onclick="exportJSON()">⬇ Export JSON</button>
        <button class="btn btn-accent" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div style="font-size:12px;color:var(--faint)">All data stays on this device. Nothing is sent to any server.</div>
    </div>
    <button class="btn btn-ghost" onclick="go(2)">← Back to edit</button>`;
}

// ── Handlers ──────────────────────────────────────────────────────────────────
function go(n){S.step=n;render();window.scrollTo(0,0)}
function step1Next(){['siteId','contactName','address','email','homeType','yearBuilt','notes'].forEach(k=>{const el=document.getElementById('f-'+k);if(el)S.r[k]=el.value});go(2)}
function addItem(){S.items.push(mkItem());render()}
function removeItem(id){if(S.items.length>1)S.items=S.items.filter(i=>i.id!==id);render()}
function updF(id,k,v){updItem(id,{[k]:v})}
function updD(id,k,v){const it=getItem(id);if(it)updItem(id,{data:{...it.data,[k]:v}})}
function updCombined(id,v){const it=getItem(id);if(it)updItem(id,{combinedOcr:v})}
function reparse(id){const it=getItem(id);if(!it)return;updItem(id,{data:parseOCR(it.combinedOcr,it.type)});render()}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
window.addEventListener('tesseract-ready',initOCR);
</script>

<script
  src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"
  onload="window.dispatchEvent(new Event('tesseract-ready'))"
  onerror="(function(){S.ocrState='failed';document.getElementById('ocr-txt').className='ocrs failed';document.getElementById('ocr-txt').innerHTML='⚠ Could not load OCR library'})()">
</script>
</body>
</html>
